<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>

<body>
    {% for post in allPosts: %}
    {% if post["id"] == 2: %}
    <h1>{{post["title"]}}</h1>
    <h2>{{post["subtitle"]}}</h2>
    {% endif %}
    {% endfor %}
    <a href="{{ url_for('get_link', num=3) }}">Click here</a>
</body>

</html>
